<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdvayPass — Link Expired</title>
  <link rel="icon" type="image/png" href="/icons/icon-192.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1a0a00" />
  <meta name="robots" content="noindex, nofollow" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Sora', sans-serif;
      background: linear-gradient(150deg, #1a0a00 0%, #7c2d12 50%, #9a3412 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #fff;
    }

    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.15; pointer-events: none;
    }
    .orb-1 { width: 350px; height: 350px; background: #f97316; top: -80px; right: -80px; }
    .orb-2 { width: 250px; height: 250px; background: #ef4444; bottom: -60px; left: -60px; }

    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: 48px 36px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.4);
    }

    .icon-wrap {
      width: 80px; height: 80px;
      background: rgba(239,68,68,0.2);
      border: 2px solid rgba(239,68,68,0.4);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }

    h1 { font-size: 26px; font-weight: 800; margin-bottom: 10px; }

    .message { font-size: 14px; color: rgba(255,255,255,0.55); line-height: 1.6; margin-bottom: 32px; }

    .countdown-text {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 12px;
    }
    .countdown-text strong { color: #fb923c; font-size: 20px; }

    .bar-bg { background: rgba(255,255,255,0.1); border-radius: 4px; height: 4px; overflow: hidden; margin-bottom: 28px; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, #f97316, #ef4444); border-radius: 4px; transition: width 1s linear; }

    .home-link {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 600;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 10px 20px;
      border-radius: 12px;
      transition: all 0.2s;
    }
    .home-link:hover { color: #fff; border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.06); }

    .logo { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.25); margin-top: 24px; letter-spacing: 0.08em; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="card">
    <div class="icon-wrap">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>

    <h1 id="title">Link Not Found</h1>
    <p class="message" id="msgText">This link has expired or never existed. Links on AdvayPass auto-delete after expiry.</p>

    <p class="countdown-text">Redirecting in <strong id="count">3</strong> seconds…</p>
    <div class="bar-bg">
      <div class="bar-fill" id="barFill" style="width: 0%"></div>
    </div>

    <a href="/" class="home-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Shorten a new link
    </a>

    <div class="logo">ADVAYPASS</div>
  </div>

<script>
  (function () {
    const params = new URLSearchParams(window.location.search);
    const reason = params.get('reason');

    if (reason === 'expired') {
      document.getElementById('title').textContent   = 'Link Expired';
      document.getElementById('msgText').textContent = 'This link has expired and has been permanently deleted. Create a new one below.';
    } else if (reason === 'error') {
      document.getElementById('title').textContent   = 'Something Went Wrong';
      document.getElementById('msgText').textContent = 'An error occurred while looking up this link. Please try again or create a new one.';
    }

    // Fetch smartlink
    let smartlink = 'https://millionairelucidlytransmitted.com/qfbmxh4gax?key=bc08f1d488a15a751b9aec38cdf96e49';
    fetch('/api/config').then(r => r.json()).then(d => { if (d.smartlink) smartlink = d.smartlink; }).catch(() => {});

    // 3-second countdown then hard redirect
    let secs = 3;
    const countEl  = document.getElementById('count');
    const barFill  = document.getElementById('barFill');

    const t = setInterval(() => {
      secs--;
      countEl.textContent = secs;
      barFill.style.width = ((3 - secs) / 3 * 100) + '%';
      if (secs <= 0) {
        clearInterval(t);
        window.location.href = smartlink;
      }
    }, 1000);
  })();
</script>
</body>
</html>
