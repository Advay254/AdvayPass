<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>AdvayPass — Loading…</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="robots" content="noindex, nofollow" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Sora', sans-serif;
      background: linear-gradient(150deg, #0a0f1e 0%, #0f172a 40%, #1e2d4a 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── BACKGROUND ORBS ── */
    .orb { position: fixed; border-radius: 50%; filter: blur(90px); opacity: 0.1; pointer-events: none; animation: orb-drift 9s ease-in-out infinite; }
    .orb-1 { width: 450px; height: 450px; background: #3b82f6; top: -120px; left: -80px; }
    .orb-2 { width: 300px; height: 300px; background: #1d4ed8; bottom: -60px; right: -60px; animation-delay: 3.5s; }
    .orb-3 { width: 200px; height: 200px; background: #60a5fa; top: 50%; left: 50%; animation-delay: 6s; opacity: 0.06; }
    @keyframes orb-drift { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-20px) scale(1.03)} }

    /* ══════════════════════════════════════════════
       RACE CAR PROGRESS BAR
    ══════════════════════════════════════════════ */
    .progress-track {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: rgba(255,255,255,0.05);
      z-index: 300;
    }
    .progress-fill {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #1e40af 0%, #3b82f6 55%, #93c5fd 100%);
      transition: width 1s linear;
    }
    /* Glow trail on leading edge */
    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0; top: -2px;
      width: 80px; height: 9px;
      background: linear-gradient(90deg, transparent, rgba(147,197,253,0.45));
      pointer-events: none;
    }
    /* The "car" — a chain link icon riding the leading edge */
    .progress-car {
      position: fixed;
      top: -14px;
      left: 0%;
      z-index: 301;
      width: 32px;
      height: 32px;
      transform: translateX(-50%);
      transition: left 1s linear;
      background: linear-gradient(135deg, #2563eb, #1e40af);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 0 3px rgba(10,15,30,1),
        0 0 0 4.5px rgba(59,130,246,0.5),
        0 0 24px rgba(59,130,246,0.7);
      animation: car-glow 0.9s ease-in-out infinite alternate;
      color: white;
    }
    .progress-car svg { display: block; }
    @keyframes car-glow {
      from { box-shadow: 0 0 0 3px rgba(10,15,30,1), 0 0 0 4px rgba(59,130,246,0.4), 0 0 16px rgba(59,130,246,0.5); }
      to   { box-shadow: 0 0 0 3px rgba(10,15,30,1), 0 0 0 5px rgba(96,165,250,0.7), 0 0 32px rgba(96,165,250,0.9); }
    }
    /* Small speed-trail particles */
    .car-trail {
      position: fixed;
      top: -1px;
      height: 3px;
      border-radius: 0 2px 2px 0;
      z-index: 300;
      pointer-events: none;
      animation: trail-fade 1s linear infinite;
    }
    @keyframes trail-fade { 0%{opacity:.4} 100%{opacity:0} }

    /* ── PAGE LAYOUT ── */
    .page-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
      padding: 28px 16px 200px;
      position: relative;
      z-index: 1;
    }

    /* ── BRAND ── */
    .brand-bar {
      display: flex; align-items: center; gap: 7px;
      margin-bottom: 20px; align-self: flex-start;
    }
    .brand-dot {
      width: 7px; height: 7px; background: #60a5fa; border-radius: 50%;
      animation: brand-blink 2s ease-in-out infinite;
    }
    @keyframes brand-blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
    .brand-text { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.25); letter-spacing: 0.12em; text-transform: uppercase; }
    .brand-text b { color: #93c5fd; font-weight: 800; }

    /* ══════════════════════════════════════════════
       AD ZONES — drop Adsterra code inside these
    ══════════════════════════════════════════════ */
    .ad-zone {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 16px;
    }

    /* ══════════════════════════════════════════════
       FLOATING DESTINATION WIDGET
    ══════════════════════════════════════════════ */
    .floating-widget {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 200;
      width: 272px;
      background: rgba(10,15,30,0.92);
      backdrop-filter: blur(24px) saturate(1.5);
      -webkit-backdrop-filter: blur(24px) saturate(1.5);
      border: 1px solid rgba(96,165,250,0.18);
      border-radius: 22px;
      padding: 18px;
      box-shadow:
        0 24px 64px rgba(0,0,0,0.55),
        0 0 0 1px rgba(255,255,255,0.04),
        inset 0 1px 0 rgba(255,255,255,0.06);
      animation: widget-in 0.6s cubic-bezier(0.16,1,0.3,1) 0.2s both;
    }
    @keyframes widget-in {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Widget header */
    .widget-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .widget-pulse {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #60a5fa;
      position: relative;
      flex-shrink: 0;
    }
    .widget-pulse::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: rgba(96,165,250,0.25);
      animation: pulse-ring 1.8s ease-out infinite;
    }
    @keyframes pulse-ring {
      0%   { transform: scale(0.7); opacity: 1; }
      100% { transform: scale(2); opacity: 0; }
    }
    .widget-header-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #1e40af, #2563eb);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: white;
    }
    .widget-header-text { flex: 1; }
    .widget-title { font-size: 11.5px; font-weight: 700; color: rgba(255,255,255,0.9); letter-spacing: 0.01em; }
    .widget-subtitle { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 1px; }

    /* Divider */
    .widget-divider { height: 1px; background: rgba(255,255,255,0.07); margin: 12px 0; }

    /* Link preview */
    .link-preview {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 10px 12px;
    }
    .preview-favicon-wrap {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .preview-favicon { width: 20px; height: 20px; border-radius: 4px; }
    .preview-favicon-fallback {
      width: 20px; height: 20px;
      color: rgba(255,255,255,0.3);
    }
    .preview-text { flex: 1; min-width: 0; }
    .preview-domain { font-size: 11.5px; font-weight: 700; color: rgba(255,255,255,0.8); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .preview-url { font-size: 10px; color: rgba(255,255,255,0.3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

    /* Countdown section */
    .countdown-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
    }

    /* Mini ring */
    .mini-ring-wrap {
      position: relative;
      width: 52px; height: 52px;
      flex-shrink: 0;
    }
    .mini-ring-svg { transform: rotate(-90deg); overflow: visible; }
    .mini-ring-track { fill: none; stroke: rgba(255,255,255,0.07); stroke-width: 4; }
    .mini-ring-fill {
      fill: none; stroke: #60a5fa; stroke-width: 4; stroke-linecap: round;
      stroke-dasharray: 132; stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
      filter: drop-shadow(0 0 4px rgba(96,165,250,0.6));
    }
    .mini-ring-num {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      font-size: 16px; font-weight: 800; color: #fff; line-height: 1;
    }

    /* Continue / Unlock button */
    .btn-continue {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 11px 10px;
      border-radius: 12px;
      border: 1.5px solid rgba(255,255,255,0.08);
      cursor: pointer;
      font-family: 'Sora', sans-serif;
      font-size: 12px;
      font-weight: 700;
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.2);
      transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
      pointer-events: none;
      white-space: nowrap;
    }
    .btn-continue.active {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      border-color: rgba(96,165,250,0.4);
      pointer-events: all;
      box-shadow: 0 6px 24px rgba(37,99,235,0.45);
      animation: continue-pulse 2.5s ease-in-out infinite;
    }
    @keyframes continue-pulse {
      0%,100% { box-shadow: 0 6px 24px rgba(37,99,235,0.45); }
      50% { box-shadow: 0 8px 32px rgba(37,99,235,0.7); }
    }
    .btn-continue.active:hover { background: linear-gradient(135deg, #1d4ed8, #1e40af); transform: translateY(-1px); }

    /* Waiting dots */
    .dot-anim { display: inline-flex; gap: 3px; align-items: center; }
    .wd { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.2); animation: wd-blink 1.2s ease-in-out infinite; }
    .wd:nth-child(2){animation-delay:.2s} .wd:nth-child(3){animation-delay:.4s}
    @keyframes wd-blink { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1)} }

    /* Skip Wait button */
    .btn-skip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      font-weight: 700;
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      color: #fff;
      box-shadow: 0 6px 20px rgba(245,158,11,0.3);
      transition: all 0.2s ease;
      text-decoration: none;
      letter-spacing: 0.02em;
    }
    .btn-skip:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(245,158,11,0.5); }
    .btn-skip:active { transform: translateY(0); }
    /* Subtle shimmer on skip button */
    .btn-skip::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 12px;
      background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
      transform: translateX(-100%);
      animation: skip-shimmer 2.5s ease-in-out 1s infinite;
    }
    .btn-skip { position: relative; overflow: hidden; }
    @keyframes skip-shimmer {
      0%,50%  { transform: translateX(-100%); }
      70%,100%{ transform: translateX(100%); }
    }

    /* Footer */
    .page-footer { text-align: center; font-size: 10px; color: rgba(255,255,255,0.15); padding: 16px 0 8px; }
    .page-footer a { color: rgba(255,255,255,0.25); text-decoration: none; }
    .page-footer a:hover { color: rgba(255,255,255,0.45); }
  </style>
  <script src="https://millionairelucidlytransmitted.com/2c/4d/4d/2c4d4dd588777c6db45f4cb1fe28e235.js"></script>
</head>

    <!-- Header -->
    <div class="widget-header">

      <div class="widget-header-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>

        </svg>
      </div>
      <div class="widget-header-text">
        <div class="widget-title">Routing your link</div>
        <div class="widget-subtitle">Taking you to your destination…</div>
      </div>
    </div>

    <!-- Link Preview -->
    <div class="link-preview">
      <div class="preview-favicon-wrap">
        <img id="previewFavicon" class="preview-favicon" src="" alt="" style="display:none;"
          onerror="this.style.display='none'; document.getElementById('faviconFallback').style.display='block';" />
        <svg id="faviconFallback" class="preview-favicon-fallback" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      </div>
      <div class="preview-text">
        <div class="preview-domain" id="previewDomain">Loading…</div>
        <div class="preview-url" id="previewUrl">Fetching destination</div>
      </div>
    </div>

    <!-- Countdown row: ring + continue button side by side -->

      <!-- Ring -->
      <div class="mini-ring-wrap">
        <svg class="mini-ring-svg" width="52" height="52" viewBox="0 0 52 52">
          <circle class="mini-ring-track" cx="26" cy="26" r="21"/>
          <circle class="mini-ring-fill" id="ringFill" cx="26" cy="26" r="21"/>
        </svg>
        <div class="mini-ring-num" id="ringNum">15</div>
      </div>
      <!-- Continue button -->
      <button id="continueBtn" class="btn-continue" onclick="goDestination()" aria-label="Go to destination">
        <span id="continueBtnInner">
          <span class="dot-anim">
            <span class="wd"></span><span class="wd"></span><span class="wd"></span>
          </span>
        </span>

      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
      Skip Wait

<script>
  (function () {
    const TOTAL     = 15;
    const UNLOCK_AT = 10;

    const params = new URLSearchParams(window.location.search);
    const dest   = decodeURIComponent(params.get('dest') || '');

    // ── Link preview ────────────────────────────────────────────────────────
    if (dest) {
      try {
        const u = new URL(dest);
        const domain = u.hostname.replace(/^www\./, '');

        document.getElementById('previewDomain').textContent = domain;
        document.getElementById('previewUrl').textContent    = dest.length > 42 ? dest.slice(0, 42) + '…' : dest;

        const favicon = document.getElementById('previewFavicon');
        favicon.src = 'https://www.google.com/s2/favicons?domain=' + encodeURIComponent(u.hostname) + '&sz=32';
        favicon.onload = function () {
          favicon.style.display = 'block';
          document.getElementById('faviconFallback').style.display = 'none';
        };
      } catch (_) {
        document.getElementById('previewDomain').textContent = 'Destination link';
        document.getElementById('previewUrl').textContent    = dest.slice(0, 42) + (dest.length > 42 ? '…' : '');
      }
    } else {
      document.getElementById('previewDomain').textContent = 'Destination link';
      document.getElementById('previewUrl').textContent    = 'Preparing redirect…';
    }

    // ── Smartlink ────────────────────────────────────────────────────────────
    let smartlink = 'https://millionairelucidlytransmitted.com/qfbmxh4gax?key=bc08f1d488a15a751b9aec38cdf96e49';
    fetch('/api/config').then(r => r.json()).then(d => {
      if (d.smartlink) { smartlink = d.smartlink; document.getElementById('skipBtn').href = smartlink; }
    }).catch(() => {});
    document.getElementById('skipBtn').href = smartlink;

    // ── DOM refs ─────────────────────────────────────────────────────────────
    const ringFill     = document.getElementById('ringFill');
    const ringNum      = document.getElementById('ringNum');
    const continueBtn  = document.getElementById('continueBtn');
    const progressFill = document.getElementById('progressFill');
    const progressCar  = document.getElementById('progressCar');
    const circumference = 2 * Math.PI * 21; // r=21

    ringFill.style.strokeDasharray  = circumference;
    ringFill.style.strokeDashoffset = 0;

    // Init car at left edge
    progressCar.style.left = '0%';

    // ── Tick ─────────────────────────────────────────────────────────────────
    let elapsed    = 0;
    let redirected = false;

    const tick = setInterval(() => {
      elapsed++;

      const pct = Math.min((elapsed / TOTAL) * 100, 100);

      // Progress fill width
      progressFill.style.width = pct + '%';

      // Race car position (clamped so it doesn't go off-screen)
      const carPct = Math.min(pct, 98);
      progressCar.style.left = carPct + '%';

      // Ring countdown
      const remaining = TOTAL - elapsed;
      ringNum.textContent = remaining > 0 ? remaining : '0';
      ringFill.style.strokeDashoffset = (elapsed / TOTAL) * circumference;

      // Change ring color as time runs low
      if (elapsed >= 12) {
        ringFill.style.stroke = '#f59e0b';
        ringFill.style.filter = 'drop-shadow(0 0 4px rgba(245,158,11,0.7))';
      } else if (elapsed >= 8) {
        ringFill.style.stroke = '#60a5fa';
        ringFill.style.filter = 'drop-shadow(0 0 4px rgba(96,165,250,0.6))';
      }

      // Unlock Continue at UNLOCK_AT
      if (elapsed >= UNLOCK_AT && !continueBtn.classList.contains('active')) {
        continueBtn.classList.add('active');
        document.getElementById('continueBtnInner').innerHTML =
          `Continue &nbsp;<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
      }

      // Auto-redirect at TOTAL
      if (elapsed >= TOTAL && !redirected) {
        clearInterval(tick);
        goDestination();
      }
    }, 1000);

    // ── Go to destination ────────────────────────────────────────────────────
    window.goDestination = function () {
      if (redirected || !dest) return;
      redirected = true;
      clearInterval(tick);
      window.location.href = dest;
    };

    // ── Skip Wait — opens smartlink in new tab, stays on this page ───────────
    window.onSkipClick = function (e) {
      e.preventDefault();
      window.open(smartlink, '_blank', 'noopener,noreferrer');
    };
  })();
</script>
</body>
