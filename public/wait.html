<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdvayPass — Loading…</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Sora', sans-serif;
      background: linear-gradient(150deg, #0f172a 0%, #1e3a8a 50%, #1e40af 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: 110px;
    }

    .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.12; pointer-events: none; animation: drift 8s ease-in-out infinite; }
    .orb-1 { width: 400px; height: 400px; background: #3b82f6; top: -100px; left: -100px; }
    .orb-2 { width: 300px; height: 300px; background: #60a5fa; bottom: -80px; right: -80px; animation-delay: 3s; }
    @keyframes drift { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-16px)} }

    #progressBar {
      position: fixed; top: 0; left: 0; height: 3px; z-index: 200;
      background: linear-gradient(90deg, #60a5fa, #93c5fd, #f59e0b);
      background-size: 200% 100%;
      animation: shimmer 1.5s linear infinite;
      transition: width 1s linear;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* Page layout */
    .page-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
      padding: 16px 16px 0;
      flex: 1;
    }

    /* Brand */
    .brand-bar {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 16px; align-self: flex-start;
    }
    .brand-bar .dot { width: 7px; height: 7px; background: #60a5fa; border-radius: 50%; }
    .brand-bar span { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.3); letter-spacing: 0.1em; text-transform: uppercase; }
    .brand-bar span b { color: #93c5fd; }

    /* Banner slots */
    .banner-slot {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255,255,255,0.04);
      border: 1px dashed rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .banner-slot-1 { height: 60px; }
    .banner-slot-2 { height: 260px; }
    .banner-slot-3 { height: 100px; margin-top: 12px; }
    .b-label {
      position: absolute; top: 5px; left: 10px;
      font-size: 9px; color: rgba(255,255,255,0.12);
      font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    }

    /* Skip Wait button */
    .btn-skip {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      color: #fff;
      box-shadow: 0 8px 24px rgba(245,158,11,0.35);
      transition: all 0.2s;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .btn-skip:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(245,158,11,0.5); }
    .btn-skip:active { transform: translateY(0); }

    /* Destination preview */
    .dest-preview {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 9px 14px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      word-break: break-all;
      margin-bottom: 0;
      margin-top: 12px;
      flex-shrink: 0;
    }
    .dest-preview b { color: rgba(255,255,255,0.5); margin-right: 4px; }

    .page-footer { text-align: center; font-size: 10px; color: rgba(255,255,255,0.18); margin: 14px 0 6px; flex-shrink: 0; }
    .page-footer a { color: rgba(255,255,255,0.28); text-decoration: none; }

    /* ── FLOATING COUNTDOWN (bottom-right) ── */
    .countdown-widget {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    /* Continue button */
    .btn-continue {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 16px;
      border-radius: 50px;
      border: 1.5px solid rgba(255,255,255,0.12);
      cursor: pointer;
      font-family: 'Sora', sans-serif;
      font-size: 12px;
      font-weight: 600;
      background: rgba(15,23,42,0.8);
      backdrop-filter: blur(16px);
      color: rgba(255,255,255,0.3);
      transition: all 0.4s ease;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
    }
    .btn-continue.active {
      background: rgba(37,99,235,0.9);
      color: #fff;
      border-color: rgba(96,165,250,0.45);
      pointer-events: all;
      box-shadow: 0 8px 28px rgba(37,99,235,0.45);
    }
    .btn-continue.active:hover { background: rgba(29,78,216,0.95); transform: translateY(-1px); }

    /* Mini ring */
    .mini-ring-wrap {
      position: relative;
      width: 54px;
      height: 54px;
      background: rgba(15,23,42,0.85);
      backdrop-filter: blur(16px);
      border-radius: 50%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.07);
    }
    .mini-ring-svg { transform: rotate(-90deg); }
    .mini-ring-track { fill: none; stroke: rgba(255,255,255,0.07); stroke-width: 4; }
    .mini-ring-fill {
      fill: none; stroke: #60a5fa; stroke-width: 4; stroke-linecap: round;
      stroke-dasharray: 132; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear;
    }
    .mini-ring-num {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      font-size: 17px; font-weight: 800; color: #fff; line-height: 1;
    }

    /* Waiting dots */
    .dot-anim { display: inline-flex; gap: 3px; align-items: center; }
    .wd { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.25); animation: blink 1.2s ease-in-out infinite; }
    .wd:nth-child(2){animation-delay:.2s} .wd:nth-child(3){animation-delay:.4s}
    @keyframes blink { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1)} }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div id="progressBar" style="width:0%"></div>

  <div class="page-inner">
    <div class="brand-bar">
      <div class="dot"></div>
      <span>Advay<b>Pass</b></span>
    </div>

    <!-- BANNER 1 — Top (320×50) -->
    <div class="banner-slot banner-slot-1">
      <span class="b-label">Banner Ad 1 · 320×50</span>
      <!-- PLACE BANNER AD 1 CODE HERE -->
    </div>

    <!-- BANNER 2 — Rectangle (300×250) -->
    <div class="banner-slot banner-slot-2">
      <span class="b-label">Banner Ad 2 · 300×250</span>
      <!-- PLACE BANNER AD 2 CODE HERE -->
    </div>

    <!-- Skip Wait (smartlink button) -->
    <a id="skipBtn" href="#" target="_blank" rel="noopener" class="btn-skip" onclick="onSkipClick(event)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Skip Wait
    </a>

    <!-- BANNER 3 — Medium (300×100) -->
    <div class="banner-slot banner-slot-3">
      <span class="b-label">Banner Ad 3 · 300×100</span>
      <!-- PLACE BANNER AD 3 CODE HERE -->
    </div>

    <!-- Destination preview -->
    <div class="dest-preview">
      <b>→</b><span id="destText">loading…</span>
    </div>

    <div class="page-footer">Shortened by <a href="/">AdvayPass</a></div>
  </div>

  <!-- FLOATING COUNTDOWN — bottom right -->
  <div class="countdown-widget">
    <button id="continueBtn" class="btn-continue" onclick="goDestination()">
      <span id="continueBtnInner">
        <span class="dot-anim">
          <span class="wd"></span><span class="wd"></span><span class="wd"></span>
        </span>
      </span>
    </button>
    <div class="mini-ring-wrap">
      <svg class="mini-ring-svg" width="54" height="54" viewBox="0 0 54 54">
        <circle class="mini-ring-track" cx="27" cy="27" r="21"/>
        <circle class="mini-ring-fill" id="ringFill" cx="27" cy="27" r="21"/>
      </svg>
      <div class="mini-ring-num" id="ringNum">15</div>
    </div>
  </div>

<script>
  (function () {
    const TOTAL     = 15;
    const UNLOCK_AT = 10; // Continue button unlocks after 10 seconds

    const params = new URLSearchParams(window.location.search);
    const dest   = decodeURIComponent(params.get('dest') || '');

    const preview = dest.length > 65 ? dest.slice(0, 65) + '…' : dest;
    document.getElementById('destText').textContent = preview || 'your destination';

    // Fetch smartlink from server
    let smartlink = 'https://millionairelucidlytransmitted.com/qfbmxh4gax?key=bc08f1d488a15a751b9aec38cdf96e49';
    fetch('/api/config').then(r => r.json()).then(d => {
      if (d.smartlink) { smartlink = d.smartlink; document.getElementById('skipBtn').href = smartlink; }
    }).catch(() => {});
    document.getElementById('skipBtn').href = smartlink;

    const ringFill    = document.getElementById('ringFill');
    const ringNum     = document.getElementById('ringNum');
    const continueBtn = document.getElementById('continueBtn');
    const progressBar = document.getElementById('progressBar');
    const circumference = 2 * Math.PI * 21; // r=21 → ≈132

    ringFill.style.strokeDasharray  = circumference;
    ringFill.style.strokeDashoffset = 0;

    let elapsed    = 0;
    let redirected = false;

    const tick = setInterval(() => {
      elapsed++;
      progressBar.style.width = ((elapsed / TOTAL) * 100) + '%';

      const remaining = TOTAL - elapsed;
      ringNum.textContent = remaining > 0 ? remaining : '0';
      ringFill.style.strokeDashoffset = (elapsed / TOTAL) * circumference;

      // Unlock Continue at 10s
      if (elapsed >= UNLOCK_AT && !continueBtn.classList.contains('active')) {
        continueBtn.classList.add('active');
        document.getElementById('continueBtnInner').innerHTML =
          `Continue &nbsp;<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
      }

      // Auto-redirect at 15s
      if (elapsed >= TOTAL && !redirected) {
        clearInterval(tick);
        goDestination();
      }
    }, 1000);

    window.goDestination = function () {
      if (redirected || !dest) return;
      redirected = true;
      clearInterval(tick);
      window.location.href = dest;
    };

    // Skip Wait — opens smartlink in NEW TAB, this page stays
    window.onSkipClick = function (e) {
      e.preventDefault();
      window.open(smartlink, '_blank', 'noopener,noreferrer');
    };
  })();
</script>
</body>
</html>
